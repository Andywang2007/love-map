<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>珺珺和铭铭的见面日记</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="top-bar" aria-label="见面记录总览">
        <div>
          <p class="eyebrow">Our Meeting Diary</p>
          <h1>珺珺和铭铭的见面日记</h1>
        </div>
        <div class="summary" aria-label="统计信息">
          <div>
            <strong id="total-count">0</strong>
            <span>次见面</span>
          </div>
          <div>
            <strong id="city-count">0</strong>
            <span>座城市</span>
          </div>
        </div>
      </section>

      <section class="workspace">
        <section class="map-panel" aria-label="见面地图">
          <div class="map-toolbar">
            <div>
              <p class="panel-label">Map</p>
              <h2>见面城市</h2>
            </div>
            <div class="toolbar-actions">
              <button class="ghost-button" id="show-country" type="button">全国</button>
              <button class="primary-button" id="open-form" type="button">
                <span aria-hidden="true">+</span>
                新增记录
              </button>
            </div>
          </div>
          <p class="sync-status" id="sync-status">本地模式</p>

          <div class="map-canvas" id="map-canvas">
            <div class="baidu-map" id="baidu-map"></div>
            <div class="map-loading" id="map-loading">正在加载地图...</div>
            <div class="country-globe" id="country-globe" aria-label="夜间地球全国视图" hidden>
              <div class="star-field"></div>
              <div class="night-map-stage" id="night-map-stage" aria-label="可拖动旋转的夜间中国地图">
                <div class="night-map-world" id="night-map-world">
                  <img class="night-map-image" src="./assets/night-china-map.png" alt="" />
                  <div class="night-map-vignette"></div>
                  <div class="globe-pins" id="globe-pins"></div>
                </div>
              </div>
              <div class="globe-caption">
                <span>Night Earth</span>
                <strong>点亮你们见过面的城市</strong>
              </div>
            </div>
            <div class="marker-layer" id="marker-layer"></div>
          </div>
        </section>

        <aside class="detail-panel" aria-live="polite">
          <div class="detail-heading">
            <p class="panel-label">Current Memory</p>
            <h2 id="detail-city">选择一个城市</h2>
          </div>
          <div class="detail-actions">
            <button class="ghost-button" id="edit-record" type="button">编辑</button>
            <button class="danger-button" id="delete-record" type="button">删除</button>
          </div>

          <div class="detail-meta">
            <div>
              <span>时间</span>
              <strong id="detail-time">-</strong>
            </div>
            <div>
              <span>具体地点</span>
              <strong id="detail-place">-</strong>
            </div>
            <div>
              <span>住处</span>
              <strong id="detail-stay">-</strong>
            </div>
          </div>

          <p class="memory-note" id="detail-note">点开地图上的一个点，查看这次见面的具体记录。</p>

          <div class="daily-events-wrap">
            <p class="panel-label">Daily Events</p>
            <div class="daily-events" id="daily-events"></div>
          </div>

          <div class="photo-grid" id="photo-grid" aria-label="照片"></div>

          <div class="timeline-wrap">
            <div class="timeline-head">
              <p class="panel-label">Timeline</p>
              <button class="ghost-button" id="reset-demo" type="button">恢复示例</button>
            </div>
            <ol class="timeline" id="timeline"></ol>
          </div>
        </aside>
      </section>
    </main>

    <dialog class="record-dialog" id="record-dialog" aria-labelledby="dialog-title">
      <form class="record-form" id="record-form" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="panel-label">New Memory</p>
            <h2 id="dialog-title">新增见面记录</h2>
          </div>
          <button class="icon-button" id="close-form" type="button" aria-label="关闭">x</button>
        </div>

        <label>
          城市
          <input name="city" required placeholder="例如：上海" />
        </label>
        <div class="place-search-actions">
          <button class="ghost-button" id="search-city" type="button">搜索城市</button>
          <span id="selected-city">未选择地图城市</span>
        </div>
        <div class="place-results" id="city-results" aria-live="polite"></div>

        <div class="places-editor">
          <div class="form-section-head">
            <span>具体地点</span>
            <button class="ghost-button" id="add-place" type="button">+ 添加地点</button>
          </div>
          <div class="places-list" id="places-list"></div>
        </div>

        <div class="form-row">
          <label>
            开始日期
            <input name="startDate" required type="date" />
          </label>
          <label>
            结束日期
            <input name="endDate" type="date" />
          </label>
        </div>

        <label>
          住哪里
          <input name="stay" required placeholder="例如：外滩附近的小酒店" />
        </label>
        <div class="place-search-actions">
          <button class="ghost-button" id="search-stay" type="button">搜索住处</button>
          <span id="selected-stay">未选择地图住处</span>
        </div>
        <div class="place-results" id="stay-results" aria-live="polite"></div>

        <label>
          具体内容
          <textarea name="note" required rows="4" placeholder="写下这次见面的细节"></textarea>
        </label>

        <div class="daily-events-editor">
          <div class="form-section-head">
            <span>每日事件</span>
            <button class="ghost-button" id="add-daily-event" type="button">+ 添加每日事件</button>
          </div>
          <div class="daily-events-list" id="daily-events-list"></div>
        </div>

        <label>
          照片
          <input name="photos" accept="image/*" multiple type="file" />
        </label>

        <div class="dialog-actions">
          <button class="ghost-button" id="cancel-form" type="button">取消</button>
          <button class="primary-button" type="submit">保存记录</button>
        </div>
      </form>
    </dialog>

    <script src="./script.js"></script>
  </body>
</html>
